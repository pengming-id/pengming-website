<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯繫 — 芃洺設計 Pengming Interior Design</title>
<meta name="description" content="如果你正在尋找適合自己的空間樣貌,歡迎與芃洺設計分享想法,讓設計從一場真誠的對話開始。">
<meta property="og:title" content="芃洺設計 Pengming Interior Design">
<meta property="og:description" content="如果你正在尋找適合自己的空間樣貌,歡迎與芃洺設計分享想法,讓設計從一場真誠的對話開始。">
<meta property="og:image" content="https://www.pengming-id.com/favicon.png">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --color-warm-white:#F6F3EE;
    --color-warm-white-deep:#EAE4DA;
    --color-deep-brown:#1A1714;
    --color-body-text:#4A443E;
    --color-taupe:#A89078;
    --color-taupe-light:#C9BBA8;
    --font-cn:'Noto Serif TC',serif;
    --font-en:'Inter',sans-serif;
    --font-en-logo:'Cormorant Garamond',serif;
    --space-sm:16px; --space-md:32px;
    --space-lg:64px; --space-xl:100px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--color-warm-white);
    color:var(--color-body-text);
    font-family:var(--font-cn);
    font-weight:300; line-height:1.8;
    overflow-x:hidden;
  }
  .container{ max-width:1320px; margin:0 auto; padding:0 100px; }

  /* NAV */
  header.nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(246,243,238,0.96); backdrop-filter:blur(6px);
    border-bottom:1px solid transparent; transition:border-color 0.3s;
  }
  header.nav.scrolled{ border-bottom:1px solid var(--color-taupe-light); }
  .nav-inner{
    max-width:1320px; margin:0 auto; padding:26px 100px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .logo{
    font-family:var(--font-en-logo); font-weight:400; font-size:21px;
    letter-spacing:0.18em; color:var(--color-deep-brown);
    text-decoration:none; display:flex; align-items:baseline; gap:12px;
  }
  .logo span{ font-family:var(--font-cn); font-weight:300; font-size:14px; letter-spacing:0.05em; }
  nav.menu{ display:flex; gap:46px; }
  nav.menu a{
    font-family:var(--font-en); font-weight:400; font-size:12px;
    letter-spacing:0.18em; color:var(--color-deep-brown);
    text-decoration:none; position:relative; padding-bottom:4px;
  }
  nav.menu a.active{ color:var(--color-taupe); }
  nav.menu a::after{
    content:''; position:absolute; left:0; bottom:0;
    width:0; height:1px; background:currentColor;
    opacity:0.6; transition:width 0.3s;
  }
  nav.menu a:hover::after, nav.menu a.active::after{ width:100%; }

  /* MAP — full bleed, OpenStreetMap iframe */
  .map-section{
    margin-top:78px;
    width:100%; height:420px;
    overflow:hidden; position:relative;
  }
  .map-section iframe{
    width:100%;
    height:calc(100% + 55px);
    border:none; display:block;
    margin-top:-55px;
  }

  /* PAGE HEAD */
  .page-head{ padding:var(--space-lg) 0 var(--space-md); }
  .eyebrow{
    font-family:var(--font-en); font-weight:400; font-size:11px;
    letter-spacing:0.3em; text-transform:uppercase;
    color:var(--color-taupe); margin-bottom:var(--space-sm);
  }
  .page-head h1{
    font-family:var(--font-cn); font-weight:200; font-size:30px;
    color:var(--color-deep-brown); letter-spacing:0.03em;
  }

  /* MAIN LAYOUT — left info + right form */
  .contact-section{ padding:var(--space-lg) 0 var(--space-xl); }
  .contact-row{
    display:grid;
    grid-template-columns:1fr 1.6fr;
    gap:var(--space-xl);
    align-items:start;
    border-top:1px solid var(--color-taupe-light);
    padding-top:var(--space-lg);
  }

  /* LEFT — company info */
  .info-block{ }
  .info-label{
    font-family:var(--font-en); font-weight:400; font-size:10px;
    letter-spacing:0.25em; text-transform:uppercase;
    color:var(--color-taupe); margin-bottom:var(--space-sm);
  }
  .info-name{
    font-family:var(--font-cn); font-weight:300; font-size:18px;
    color:var(--color-deep-brown); letter-spacing:0.04em;
    margin-bottom:var(--space-lg);
  }
  .info-list{ display:flex; flex-direction:column; gap:var(--space-md); }
  .info-item{ }
  .info-item .item-label{
    font-family:var(--font-en); font-weight:400; font-size:10px;
    letter-spacing:0.2em; text-transform:uppercase;
    color:var(--color-taupe-light); margin-bottom:4px;
  }
  .info-item .item-value{
    font-family:var(--font-cn); font-size:14px;
    color:var(--color-body-text); line-height:1.7;
  }
  .info-item a{
    color:var(--color-body-text); text-decoration:none;
    border-bottom:1px solid var(--color-taupe-light);
    padding-bottom:2px;
    transition:color 0.3s, border-color 0.3s;
  }
  .info-item a:hover{ color:var(--color-taupe); border-color:var(--color-taupe); }

  .info-social{
    display:flex; gap:var(--space-sm); margin-top:var(--space-xl);
  }
  .info-social a{
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px;
    border:1px solid var(--color-taupe-light); border-radius:50%;
    color:var(--color-body-text); text-decoration:none;
    transition:border-color 0.3s, color 0.3s;
  }
  .info-social a:hover{ border-color:var(--color-taupe); color:var(--color-taupe); }
  .info-social svg{ width:15px; height:15px; }

  /* RIGHT — form */
  .form-block{ }
  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--space-md) var(--space-lg);
  }
  .form-field{ display:flex; flex-direction:column; gap:8px; }
  .form-field.full{ grid-column:1 / -1; }

  .form-field label{
    font-family:var(--font-en); font-weight:400; font-size:10px;
    letter-spacing:0.2em; text-transform:uppercase;
    color:var(--color-taupe);
  }
  .form-field input,
  .form-field textarea{
    background:transparent;
    border:none;
    border-bottom:1px solid var(--color-taupe-light);
    padding:10px 0;
    font-family:var(--font-cn); font-weight:300;
    font-size:14px; color:var(--color-deep-brown);
    outline:none; width:100%;
    transition:border-color 0.3s;
    resize:none;
  }
  .form-field input::placeholder,
  .form-field textarea::placeholder{
    color:var(--color-taupe-light); font-size:13px;
  }
  .form-field input:focus,
  .form-field textarea:focus{
    border-bottom-color:var(--color-taupe);
  }
  .form-field textarea{ min-height:120px; line-height:1.8; }

  .form-submit{
    margin-top:var(--space-lg);
    display:flex; align-items:center; gap:var(--space-lg);
  }
  .submit-btn{
    font-family:var(--font-en); font-weight:400;
    font-size:11px; letter-spacing:0.25em;
    color:var(--color-warm-white); background:var(--color-deep-brown);
    border:none; padding:18px 48px; cursor:pointer;
    transition:background 0.3s;
  }
  .submit-btn:hover{ background:var(--color-taupe); }
  .form-note{
    font-family:var(--font-en); font-size:10px;
    letter-spacing:0.05em; color:var(--color-taupe-light);
    line-height:1.7;
  }

  /* FOOTER */
  footer{ border-top:1px solid var(--color-taupe-light); padding:var(--space-lg) 0 var(--space-md); }
  .footer-row{ display:flex; justify-content:space-between; align-items:center; }
  .footer-brand{
    font-family:var(--font-cn); font-weight:300; font-size:15px;
    color:var(--color-deep-brown); display:flex; align-items:baseline; gap:10px;
  }
  .footer-brand small{ font-family:var(--font-en); font-size:10px; letter-spacing:0.15em; color:var(--color-taupe); }
  .footer-contact{ display:flex; gap:22px; }
  .footer-contact a{
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border:1px solid var(--color-taupe-light);
    border-radius:50%; color:var(--color-body-text); text-decoration:none;
    transition:border-color 0.3s, color 0.3s;
  }
  .footer-contact a:hover{ border-color:var(--color-taupe); color:var(--color-taupe); }
  .footer-contact svg{ width:15px; height:15px; }
  .footer-bottom{ margin-top:var(--space-md); font-family:var(--font-en); font-size:10px; color:var(--color-taupe-light); text-align:center; }

  .reveal{ opacity:0; transform:translateY(20px); transition:opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">PENGMING<span>芃洺設計</span></a>
    <nav class="menu">
      <a href="about.html">關於</a>
      <a href="works.html">作品</a>
      <a href="services.html">服務</a>
      <a href="journal.html">設計札記</a>
      <a href="contact.html" class="active">聯繫</a>
    </nav>
  </div>
</header>

<!-- 全寬地圖 — 台中市西屯區福祥街3號 -->
<div class="map-section">
  <iframe
    src="https://www.google.com/maps/d/embed?mid=1bsduVnZaQXNdCkQPftM0--opgGHBe-Q"
    style="width:100%;height:100%;border:none;display:block;filter:grayscale(20%) brightness(1.02);"
    allowfullscreen
    loading="lazy"
    title="芃洺設計位置">
  </iframe>
</div>

<section class="page-head">
  <div class="container reveal">
    <div class="eyebrow">Contact</div>
    <h1>聯繫我們</h1>
  </div>
</section>

<section class="contact-section">
  <div class="container reveal">
    <div class="contact-row">

      <!-- 左側公司資料 -->
      <div class="info-block">
        <div class="info-label">Studio</div>
        <div class="info-name">芃洺設計<br>高豐室內裝修設計有限公司</div>
        <div class="info-list">
          <div class="info-item">
            <div class="item-label">Address</div>
            <div class="item-value">台中市西屯區<br>福祥街 3 號</div>
          </div>
          <div class="info-item">
            <div class="item-label">Tel</div>
            <div class="item-value">
              <a href="tel:+886424629292">+886-4-2462-9292</a>
            </div>
          </div>
          <div class="info-item">
            <div class="item-label">Email</div>
            <div class="item-value">
              <a href="mailto:info@pengming-id.com">info@pengming-id.com</a>
            </div>
          </div>
        </div>
        <div class="info-social">
          <a href="https://www.instagram.com/pengming.co" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="4.5"/><circle cx="12" cy="12" r="3.6"/><circle cx="17.2" cy="6.8" r="0.6" fill="currentColor" stroke="none"/></svg>
          </a>
          
        </div>
      </div>

      <!-- 右側表單 -->
      <div class="form-block">
        <!-- 上線前請至 formspree.io 免費註冊,將 YOUR_FORM_ID 替換為實際 ID -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="form-grid">
            <div class="form-field">
              <label for="name">姓名 Name</label>
              <input type="text" id="name" name="name" placeholder="您的姓名" required>
            </div>
            <div class="form-field">
              <label for="email">信箱 Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-field full">
              <label for="phone">電話 Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="09xx-xxx-xxx">
            </div>
            <div class="form-field full">
              <label for="message">訊息 Message</label>
              <textarea id="message" name="message" placeholder="請簡短描述您的空間與需求" required></textarea>
            </div>
          </div>
          <div class="form-submit">
            <button type="submit" class="submit-btn">送出訊息</button>
            <span class="form-note">我們將於 2 個工作天內與您聯繫<br>個人資料僅用於本次合作聯繫</span>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-row">
      <div class="footer-brand">芃洺設計 <small>PENGMING INTERIOR DESIGN</small></div>
      <div class="footer-contact">
        <a href="mailto:info@pengming-id.com" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1"/><path d="M3 6.5l8.4 6.2a1.5 1.5 0 0 0 1.8 0L21.5 6.5"/></svg>
        </a>
        <a href="https://www.instagram.com/pengming.co" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="4.5"/><circle cx="12" cy="12" r="3.6"/><circle cx="17.2" cy="6.8" r="0.6" fill="currentColor" stroke="none"/></svg>
        </a>
        
      </div>
    </div>
    <div class="footer-bottom">© 2026 PENGMING INTERIOR DESIGN. All Rights Reserved.</div>
  </div>
</footer>

<script>
  window.addEventListener('scroll',()=>{
    document.getElementById('nav').classList.toggle('scrolled',window.scrollY>20);
  });
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});
  },{threshold:0.1});
  document.querySelectorAll('.reveal').forEach(r=>obs.observe(r));
</script>
</body>
</html>
